root = "."
tmp_dir = "tmp"

[build]
  cmd = "task go:build"
  bin = "./bin/main"
  delay = 500
  # Ignore everything related to the frontend and tooling
  exclude_dir = ["frontend", "node_modules", "assets", "tmp", "vendor", ".git", ".svelte-kit"]
  exclude_regex = ["_test.go", ".*_templ.go"]
  # Only watch your Go logic and templates
  include_dir = ["cmd", "internal", "models", "templates"]
  include_ext = ["go", "templ", "html"]
  stop_on_error = true
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
