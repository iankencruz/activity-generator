version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/database/queries"
    schema: "./internal/database/migrations"
    gen:
      go:
        package: "db"
        out: "internal/database"
        sql_package: "pgx/v5"
        # Emit pointers for JSON tags to handle optional fields better in Svelte
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          # Use jackc/pgtype for better NULL and TZ handling
          - db_type: "timestamptz"
            go_type: "github.com/jackc/pgx/v5/pgtype.Timestamptz"
          
          - db_type: "timestamp"
            go_type: "github.com/jackc/pgx/v5/pgtype.Timestamp"

          # Handle UUIDs natively
          - db_type: "uuid"
            go_type: "github.com/jackc/pgx/v5/pgtype.UUID"

          # Better JSONB support for Go maps/structs
          - db_type: "jsonb"
            go_type: "github.com/jackc/pgx/v5/pgtype.JSONB"

          # Numeric/Decimal handling (avoids float64 precision issues)
          - db_type: "numeric"
            go_type: "github.com/jackc/pgx/v5/pgtype.Numeric"
